  /map/tile/{zoom}/{x}/{y}/{field}/{timeFormat}:
    get:
      operationId: getMapTile
      summary: Tomorrow.io Get Map Tile
      description: Returns a raster tile for a weather field at a given time and zoom level.
      tags:
      - Map Tiles
      parameters:
      - name: zoom
        in: path
        required: true
        description: Web Mercator zoom level (typically 0-12).
        schema:
          type: integer
          minimum: 0
          maximum: 22
        example: 6
      - name: x
        in: path
        required: true
        description: Tile column.
        schema:
          type: integer
        example: 18
      - name: y
        in: path
        required: true
        description: Tile row.
        schema:
          type: integer
        example: 24
      - name: field
        in: path
        required: true
        description: Data field name to render (e.g. temperature, precipitationIntensity).
        schema:
          type: string
        example: temperature
      - name: timeFormat
        in: path
        required: true
        description: ISO 8601 time or relative offset.
        schema:
          type: string
        example: now
      responses:
        '200':
          description: PNG raster tile.
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

