vocabulary: 1.0.0
info:
  provider: Tomorrow.io
  description: Unified vocabulary for the Tomorrow.io v4 Weather API — operational
    dimension (OpenAPI resources, actions, schemas) and capability dimension (Naftiko
    workflows + MCP tools), with a cross-reference linking each resource to its workflows
    and personas.
  created: '2026-05-30'
  modified: '2026-05-30'
