aid: tomorrow
name: Tomorrow.io
description: >-
  Tomorrow.io is a weather and climate intelligence platform exposing a unified v4 HTTP API. The API combines real-time
  observations, hyperlocal forecast timelines (minutely / hourly / daily), 20+ years of historical data, climate
  normals, weather-on-routes, configurable insights and event detection, per-location alerts with webhook delivery, and
  raster map tiles. 60+ data layers cover core weather, air quality, pollen, fire, flood, soil, solar, aviation,
  maritime, and lightning.
