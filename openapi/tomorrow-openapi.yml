  /timelines:
    get:
      operationId: getTimelines
      summary: Tomorrow.io Get Timelines
      description: Basic GET form of the Timelines endpoint. Returns one or more timesteps for a single location.
      tags:
      - Timelines
      parameters:
      - name: location
        in: query
        required: true
        schema:
          type: string
        description: Latlong, place name, GeoJSON, or saved location ID.
        example: 42.3478,-71.0466
      - name: fields
        in: query
        required: true
        description: Comma-separated list of weather data fields to return.
        schema:
          type: array
          items:
            type: string
        example: temperature,humidity,windSpeed
      - name: startTime
        in: query
        required: false
        schema:
          type: string
          default: now
        example: now
      - name: endTime
        in: query
        required: false
        schema:
          type: string
          default: nowPlus6h
        example: nowPlus6h
      - name: timesteps
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 1d
            - current
        example: 1h
      - name: units
        in: query
        required: false
        schema:
          type: string
          enum:
          - metric
          - imperial
          default: metric
      - name: timezone
        in: query
        required: false
        schema:
          type: string
          default: UTC
        example: America/New_York
      responses:
        '200':
          description: Timeline response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelinesResponse'
              examples:
                GetTimelines200Example:
                  summary: Default getTimelines 200 response
                  x-microcks-default: true
                  value:
