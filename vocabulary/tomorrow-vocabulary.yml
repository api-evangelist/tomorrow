  personas:
  - id: aviation-ops
    name: Aviation Operations Engineer
    description: Plans and reroutes flights; ingests ceiling/visibility/turbulence
      and storm cells.
    workflows:
    - tomorrow-realtime
    - tomorrow-forecast
    - tomorrow-routes
    - tomorrow-alerts
  - id: logistics-ops
    name: Logistics Operations Manager
    description: Routes trucks and crews around hail, lightning, and severe weather.
    workflows:
    - tomorrow-routes
    - tomorrow-alerts
    - tomorrow-events
  - id: energy-trader
    name: Energy Trader / Forecaster
    description: Forecasts wind and solar generation; tracks lightning for grid outage
      risk.
    workflows:
    - tomorrow-forecast
    - tomorrow-historical
    - tomorrow-climate
  - id: farm-advisor
    name: Agronomy Advisor
    description: Drives irrigation, planting and spray windows from soil and ET data.
    workflows:
    - tomorrow-forecast
    - tomorrow-historical
    - tomorrow-insights
  - id: cat-underwriter
    name: Catastrophe Underwriter
    description: Uses historical perils and climate normals to price risk.
    workflows:
    - tomorrow-historical
    - tomorrow-climate
  - id: event-ops
    name: Live-Event Operations
    description: Decides delays for stadiums and outdoor venues on lightning radius.
    workflows:
    - tomorrow-realtime
    - tomorrow-alerts
  - id: emergency-manager
    name: Public-Safety / Emergency Manager
    description: Drives municipal alerts for fire, flood, AQI.
    workflows:
    - tomorrow-events
    - tomorrow-alerts
    - tomorrow-insights
  domains:
