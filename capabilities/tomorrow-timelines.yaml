naftiko: 1.0.0-alpha2
info:
  label: Tomorrow.io Weather API — Timelines
  description: 'Timelines surface of the Tomorrow.io Weather API. 2 operations. Lead operation: Tomorrow.io Get Timelines. Self-contained Naftiko capability covering one Tomorrow.io business surface.'
  tags:
  - Tomorrow.io
  - Weather
  - Timelines
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    TOMORROW_API_KEY: TOMORROW_API_KEY
capability:
  consumes:
  - type: http
    namespace: tomorrow-timelines
    baseUri: https://api.tomorrow.io/v4
    description: Tomorrow.io Weather API — Timelines business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.TOMORROW_API_KEY}}'
      placement: query
    resources:
    - name: timelines
      path: /timelines
      operations:
      - name: getTimelines
        method: GET
        description: Tomorrow.io Get Timelines
        inputParameters:
        - name: location
          in: query
          type: string
          required: true
          description: Latlong, place name, GeoJSON, or saved location ID.
        - name: fields
          in: query
          type: array
          required: true
          description: Comma-separated list of weather data fields to return.
        - name: startTime
          in: query
          type: string
          required: false
          description: startTime
        - name: endTime
          in: query
          type: string
          required: false
          description: endTime
        - name: timesteps
          in: query
          type: array
          required: false
          description: timesteps
        - name: units
          in: query
          type: string
          required: false
          description: units
        - name: timezone
          in: query
          type: string
          required: false
          description: timezone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: postTimelines
        method: POST
        description: Tomorrow.io Post Timelines
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: tomorrow-timelines-rest
    port: 8080
    description: REST adapter for Tomorrow.io Weather API — Timelines. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/timelines
      name: timelines
      description: REST surface for timelines.
      operations:
      - method: GET
        name: getTimelines
        description: Tomorrow.io Get Timelines
        call: tomorrow-timelines.getTimelines
        with:
          location: rest.location
          fields: rest.fields
          startTime: rest.startTime
          endTime: rest.endTime
          timesteps: rest.timesteps
          units: rest.units
          timezone: rest.timezone
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postTimelines
        description: Tomorrow.io Post Timelines
        call: tomorrow-timelines.postTimelines
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tomorrow-timelines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tomorrow.io Weather API — Timelines. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: io-get-timelines
      description: Tomorrow.io Get Timelines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tomorrow-timelines.getTimelines
      with:
        location: tools.location
        fields: tools.fields
        startTime: tools.startTime
        endTime: tools.endTime
        timesteps: tools.timesteps
        units: tools.units
        timezone: tools.timezone
      outputParameters:
      - type: object
        mapping: $.
    - name: io-post-timelines
      description: Tomorrow.io Post Timelines
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tomorrow-timelines.postTimelines
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
