      summary: Tomorrow.io Activate Alert
      description: Marks an alert as active so its insights begin firing on linked locations.
      tags:
      - Alerts
      responses:
        '200':
          description: Alert activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleAck'
              examples:
                ActivateAlert200Example:
                  summary: Default activateAlert 200 response
                  x-microcks-default: true
                  value:
                    status: ok
                    message: Operation completed successfully.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /alerts/{alertId}/deactivate:
    parameters:
    - name: alertId
      in: path
      required: true
      schema:
        type: string
      example: 6183d156022c1b0008686b14
    post:
      operationId: deactivateAlert
      summary: Tomorrow.io Deactivate Alert
      description: Marks an alert as inactive so its insights stop firing.
      tags:
      - Alerts
      responses:
        '200':
          description: Alert deactivated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleAck'
              examples:
                DeactivateAlert200Example:
                  summary: Default deactivateAlert 200 response
                  x-microcks-default: true
                  value:
                    status: ok
                    message: Operation completed successfully.
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

components:
  securitySchemes:
    apiKeyQuery:
      type: apiKey
      in: query
      name: apikey
      description: Tomorrow.io API key passed as `apikey` query parameter. Obtain at https://app.tomorrow.io/development/keys.
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      description: Standard Tomorrow.io error envelope.
      properties:
        code:
          type: integer
          example: 400001
          description: Internal error code.
        type:
          type: string
          example: Invalid Body Parameters
          description: Short error type label.
        message:
          type: string
          example: The provided parameters are invalid.
          description: Human-readable error message.
      required:
      - code
      - type
      - message
    SimpleAck:
      type: object
      description: Generic success acknowledgement.
      properties:
        status:
          type: string
          example: ok
        message:
          type: string
          example: Operation completed successfully.
    WeatherValues:
      type: object
      description: Map of weather data field names to numeric values for one timestep.
      additionalProperties: true
      properties:
        temperature:
          type: number
          format: double
          description: Air temperature (Celsius for metric, Fahrenheit for imperial).
          example: 21.2
        temperatureApparent:
          type: number
          format: double
          example: 20.4
        humidity:
          type: number
          format: double
          example: 64.0
        dewPoint:
          type: number
          format: double
          example: 13.4
        windSpeed:
          type: number
          format: double
          example: 3.1
        windDirection:
          type: number
          format: double
          example: 220
        windGust:
          type: number
          format: double
          example: 6.2
        pressureSeaLevel:
          type: number
          format: double
          example: 1013.2
        pressureSurfaceLevel:
          type: number
          format: double
          example: 1010.5
        precipitationIntensity:
          type: number
          format: double
          example: 0.0
        precipitationProbability:
          type: number
          format: double
          example: 5
        precipitationType:
          type: integer
          example: 0
        cloudCover:
          type: number
          format: double
          example: 12
        cloudBase:
          type: number
          format: double
          example: 1.5
        cloudCeiling:
          type: number
          format: double
          example: 2.4
        visibility:
          type: number
          format: double
          example: 16
        weatherCode:
          type: integer
          example: 1000
        uvIndex:
          type: integer
          example: 6
        uvHealthConcern:
          type: integer
          example: 2
        epaIndex:
          type: integer
          example: 42
        epaHealthConcern:
          type: integer
          example: 1
        epaPrimaryPollutant:
          type: integer
          example: 0
        particulateMatter25:
          type: number
          format: double
          example: 8.4
        particulateMatter10:
          type: number
          format: double
          example: 14.1
        pollutantO3:
          type: number
          format: double
          example: 28
        pollutantNO2:
          type: number
          format: double
          example: 11
        pollutantCO:
          type: number
          format: double
          example: 0.4
        pollutantSO2:
          type: number
          format: double
          example: 1
        treeIndex:
          type: integer
          example: 2
        grassIndex:
          type: integer
          example: 1
        weedIndex:
          type: integer
          example: 1
        fireIndex:
          type: number
          format: double
          example: 8.2
        solarGHI:
          type: number
          format: double
          example: 480
        solarDIF:
          type: number
          format: double
          example: 120
        solarDIR:
          type: number
          format: double
          example: 360
        moonPhase:
          type: integer
          example: 3
        hailBinary:
          type: integer
          example: 0
    GeoJSONGeometry:
      type: object
      description: GeoJSON geometry — Point, LineString, or Polygon.
      properties:
        type:
          type: string
          enum:
          - Point
          - LineString
          - Polygon
          example: Point
        coordinates:
          type: array
          items: {}
          example: *id002
      required:
      - type
      - coordinates
    Location:
      type: object
      description: A saved location resource.
      properties:
        id:
          type: string
          example: 6183d156022c1b0008685cc6
        name:
          type: string
          example: Boston HQ Rooftop
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        tags:
          type: array
          items:
            type: string
          example: *id003
        createdAt:
          type: string
          format: date-time
          example: '2026-05-30T12:34:56Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-05-30T12:34:56Z'
      required:
      - id
      - name
      - geometry
    LocationCreateRequest:
      type: object
      description: Payload to create a new saved location.
      properties:
        name:
          type: string
          example: Boston HQ Rooftop
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        tags:
          type: array
          items:
            type: string
          example: *id008
      required:
      - name
      - geometry
    LocationUpdateRequest:
      type: object
      description: Payload to update a saved location.
      properties:
        name:
          type: string
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
        tags:
          type: array
          items:
            type: string
    LocationTagsRequest:
      type: object
      description: Payload for bulk add/remove of tags across locations.
      properties:
        locationIds:
          type: array
          items:
            type: string
          example: *id004
        tags:
          type: array
          items:
            type: string
          example: *id005
      required:
      - locationIds
      - tags
    TimelinesRequest:
      type: object
      description: Advanced Timelines request body.
      properties:
        location:
          oneOf:
          - type: string
            description: Pre-defined location ID, place name, or latlong string.
            example: 42.3478,-71.0466
          - $ref: '#/components/schemas/GeoJSONGeometry'
        fields:
          type: array
          items:
            type: string
          example: *id009
        units:
          type: string
          enum:
          - metric
          - imperial
          default: metric
        timesteps:
          type: array
          items:
            type: string
            enum:
            - 1m
            - 5m
            - 15m
            - 30m
            - 1h
            - 1d
            - current
          example: *id010
        startTime:
          type: string
          example: now
          description: Accepts `now`, relative `nowPlus/MinusXm/h/d`, or ISO 8601.
        endTime:
          type: string
          example: nowPlus6h
        timezone:
          type: string
          default: UTC
          example: America/New_York
        dailyStartHour:
          type: integer
          minimum: 0
          maximum: 23
          default: 6
      required:
      - location
      - fields
    TimelineInterval:
      type: object
      description: A single timestep entry in a timeline.
      properties:
        startTime:
          type: string
          format: date-time
          example: '2026-05-30T13:00:00Z'
        values:
          $ref: '#/components/schemas/WeatherValues'
    Timeline:
      type: object
      description: One timeline at a specific resolution.
      properties:
        timestep:
          type: string
          example: 1h
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        intervals:
          type: array
          items:
            $ref: '#/components/schemas/TimelineInterval'
    TimelinesResponse:
      type: object
      description: Tomorrow.io Timelines response envelope.
      properties:
        data:
          type: object
          properties:
            timelines:
              type: array
              items:
                $ref: '#/components/schemas/Timeline'
    RealtimeWeatherResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            time:
              type: string
              format: date-time
              example: '2026-05-30T13:00:00Z'
            values:
              $ref: '#/components/schemas/WeatherValues'
        location:
          type: object
          properties:
            lat:
              type: number
              format: double
              example: 42.3478
            lon:
              type: number
              format: double
              example: -71.0466
            name:
              type: string
              example: Cambridge, MA
            type:
              type: string
              example: place
    ForecastResponse:
      type: object
      properties:
        timelines:
          type: object
          properties:
            hourly:
              type: array
              items:
                $ref: '#/components/schemas/TimelineInterval'
            daily:
              type: array
              items:
                $ref: '#/components/schemas/TimelineInterval'
        location:
          type: object
          properties:
            lat:
              type: number
              format: double
            lon:
              type: number
              format: double
            name:
              type: string
    HistoricalRequest:
      type: object
      description: Historical Timelines request body.
      properties:
        location:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/GeoJSONGeometry'
        fields:
          type: array
          items:
            type: string
          example: *id011
        units:
          type: string
          enum:
          - metric
          - imperial
          default: metric
        timesteps:
          type: array
          items:
            type: string
            enum:
            - 1h
            - 1d
          example: *id012
        startTime:
          type: string
          format: date-time
          example: '2024-01-01T00:00:00Z'
        endTime:
          type: string
          format: date-time
          example: '2024-01-31T23:59:59Z'
        timezone:
          type: string
          default: UTC
      required:
      - location
      - fields
      - startTime
      - endTime
    ClimateNormalsRequest:
      type: object
      description: Climate Normals request body.
      properties:
        location:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/GeoJSONGeometry'
        fields:
          type: array
          items:
            type: string
          example: *id013
        units:
          type: string
          enum:
          - metric
          - imperial
          default: metric
      required:
      - location
      - fields
    ClimateNormalsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            normals:
              type: array
              items:
                type: object
                properties:
                  month:
                    type: integer
                    minimum: 1
                    maximum: 12
                    example: 6
                  values:
                    $ref: '#/components/schemas/WeatherValues'
    RouteWaypoint:
      type: object
      description: A waypoint on the route.
      properties:
        location:
          type: array
          items:
            type: number
            format: double
          minItems: 2
          maxItems: 2
          example: *id001
        arrivalTime:
          type: string
          format: date-time
          example: '2026-05-30T13:30:00Z'
      required:
      - location
    RouteRequest:
      type: object
      description: Route weather request body.
      properties:
        route:
          type: object
          properties:
            waypoints:
              type: array
              items:
                $ref: '#/components/schemas/RouteWaypoint'
              minItems: 2
          required:
          - waypoints
        fields:
          type: array
          items:
            type: string
          example: *id014
        units:
          type: string
          enum:
          - metric
          - imperial
          default: metric
      required:
      - route
      - fields
    RouteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            timelines:
              type: array
              items:
                $ref: '#/components/schemas/Timeline'
            route:
              type: array
              items:
                $ref: '#/components/schemas/RouteWaypoint'
    InsightCondition:
      type: object
      description: A single condition that must hold for an insight to fire.
      properties:
        field:
          type: string
          example: windSpeed
        operator:
          type: string
          enum:
          - eq
          - neq
          - gt
          - gte
          - lt
          - lte
          example: gt
        value:
          type: number
          format: double
          example: 15
      required:
      - field
      - operator
      - value
    Insight:
      type: object
      description: A named threshold definition over one or more weather fields.
      properties:
        id:
          type: string
          example: 6183d156022c1b00086860a1
        name:
          type: string
          example: High Wind
        description:
          type: string
          example: Sustained wind speed above 15 m/s.
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/InsightCondition'
        logical:
          type: string
          enum:
          - and
          - or
          default: and
        timestep:
          type: string
          example: 1h
        units:
          type: string
          enum:
          - metric
          - imperial
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - conditions
    InsightCreateRequest:
      type: object
      description: Payload to create or update an insight.
      properties:
        name:
          type: string
        description:
          type: string
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/InsightCondition'
        logical:
          type: string
          enum:
          - and
          - or
          default: and
        timestep:
          type: string
          example: 1h
        units:
          type: string
          enum:
          - metric
          - imperial
      required:
      - name
      - conditions
    EventsRequest:
      type: object
      description: Advanced Events request body.
      properties:
        location:
          oneOf:
          - type: string
          - $ref: '#/components/schemas/GeoJSONGeometry'
        insights:
          type: array
          items:
            type: string
          example: *id015
        buffer:
          type: number
          format: float
          default: 1
          description: Radius around the location in km.
      required:
      - location
      - insights
    Event:
      type: object
      description: A single insight match.
      properties:
        insightId:
          type: string
          example: 6183d156022c1b00086860a1
        startTime:
          type: string
          format: date-time
          example: '2026-05-30T15:00:00Z'
        endTime:
          type: string
          format: date-time
          example: '2026-05-30T17:00:00Z'
        severity:
          type: string
          enum:
          - low
          - medium
          - high
          - critical
          example: high
        location:
          $ref: '#/components/schemas/GeoJSONGeometry'
    EventsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            events:
              type: array
              items:
                $ref: '#/components/schemas/Event'
    Alert:
      type: object
      description: A persistent alert that fires insights over linked locations and pushes activations to a webhook.
      properties:
        id:
          type: string
          example: 6183d156022c1b0008686b14
        name:
          type: string
          example: Hail Watch — Northeast Region
        description:
          type: string
        insightIds:
          type: array
          items:
            type: string
          example: *id006
        notifications:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - webhook
                example: webhook
              url:
                type: string
                format: uri
                example: https://hooks.example.com/tomorrow-alerts
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - insightIds
    AlertCreateRequest:
      type: object
      description: Payload to create or update an alert.
      properties:
        name:
          type: string
          example: Hail Watch — Northeast Region
        description:
          type: string
        insightIds:
          type: array
          items:
            type: string
        locationIds:
          type: array
          items:
            type: string
        notifications:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - webhook
              url:
                type: string
                format: uri
        active:
          type: boolean
          default: true
      required:
      - name
      - insightIds
    AlertLocationLinkRequest:
      type: object
      properties:
        locationIds:
          type: array
          items:
            type: string
          example: *id007
      required:
      - locationIds
