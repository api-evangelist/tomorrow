    actions: &id022
    - get
    - post
  actions:
  - name: activate
    httpMethods:
    - POST
    pattern: write
  - name: add
    httpMethods:
    - POST
    pattern: write
  - name: create
    httpMethods:
    - POST
    pattern: write
  - name: deactivate
    httpMethods:
    - POST
    pattern: write
  - name: delete
    httpMethods:
    - DELETE
    pattern: destructive
  - name: get
    httpMethods:
    - GET
    pattern: read
  - name: link
    httpMethods:
    - POST
    pattern: write
  - name: list
    httpMethods:
    - GET
    pattern: read
  - name: post
    httpMethods:
    - POST
    pattern: write
  - name: remove
    httpMethods:
    - POST
    pattern: destructive
  - name: unlink
    httpMethods:
    - POST
    pattern: destructive
  - name: update
    httpMethods:
    - PUT
    pattern: write
  schemas:
    core:
    - WeatherValues
    - GeoJSONGeometry
    - RealtimeWeatherResponse
    locations:
    - Location
    - LocationCreateRequest
    - LocationUpdateRequest
    - LocationTagsRequest
    - AlertLocationLinkRequest
    insights:
    - InsightCondition
    - Insight
    - InsightCreateRequest
    alerts:
    - Alert
    - AlertCreateRequest
    events:
    - EventsRequest
    - Event
    - EventsResponse
    forecast:
    - TimelinesRequest
    - TimelineInterval
    - Timeline
    - TimelinesResponse
    - ForecastResponse
    - HistoricalRequest
    routes:
    - RouteWaypoint
    - RouteRequest
    - RouteResponse
    climate:
    - ClimateNormalsRequest
    - ClimateNormalsResponse
    errors:
    - Error
    - SimpleAck
  parameters:
    identifiers:
    - location
    - locationId
    - insightId
    - alertId
    filters:
    - insights
    - timesteps
    - fields
    - units
    - startTime
    - endTime
    - timezone
    - buffer
    - dailyStartHour
    pagination: []
    tile:
    - zoom
    - x
    - y
    - field
    - timeFormat
  enums:
    units:
    - metric
    - imperial
    timesteps:
    - 1m
    - 5m
    - 15m
    - 30m
    - 1h
    - 1d
    - current
    precipitationTypes:
    - N/A
    - Rain
    - Snow
    - Freezing Rain
    - Ice Pellets
    severity:
    - low
    - medium
    - high
    - critical
    epaHealthConcern:
    - Good
    - Moderate
    - Unhealthy for Sensitive Groups
    - Unhealthy
    - Very Unhealthy
    - Hazardous
    pollenLevels:
    - None
    - Very Low
    - Low
    - Medium
    - High
    - Very High
    logicalOperators:
    - and
    - or
    conditionOperators:
    - eq
    - neq
    - gt
    - gte
    - lt
    - lte
  authentication:
    schemes:
    - name: apiKeyQuery
      type: apiKey
      in: query
      paramName: apikey
      description: Tomorrow.io API key passed as `apikey` query parameter.
    usedBy:
    - tomorrow-weather-api
capability:
  workflows:
  - name: Tomorrow.io Weather API — Alerts
    file: capabilities/tomorrow-alerts.yaml
    description: 'Alerts surface of the Tomorrow.io Weather API. 10 operations. Lead
      operation: Tomorrow.io List Alerts. Self-contained Naftiko capability covering
      one Tomorrow.io business surface.'
    apis:
    - tomorrow-weather-api
    toolCount: 10
    namespaces:
      consumed: tomorrow-alerts
      rest: tomorrow-alerts-rest
      mcp: tomorrow-alerts-mcp
    tags:
    - Tomorrow.io
    - Weather
    - Alerts
  - name: Tomorrow.io Weather API — Climate
    file: capabilities/tomorrow-climate.yaml
    description: 'Climate surface of the Tomorrow.io Weather API. 1 operations. Lead
